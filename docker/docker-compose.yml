version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lawlatt_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: lawlatt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - lawlatt_network

  redis:
    image: redis:7-alpine
    container_name: lawlatt_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - lawlatt_network

  backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend
    container_name: lawlatt_backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/lawlatt
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ../reports:/app/reports
    networks:
      - lawlatt_network

  celery_worker:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend
    container_name: lawlatt_worker
    command: celery -A backend.workers.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/lawlatt
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      - db
      - redis
      - backend
    volumes:
      - ../reports:/app/reports
    networks:
      - lawlatt_network

  frontend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.frontend
    container_name: lawlatt_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - lawlatt_network

volumes:
  pgdata:
  redisdata:

networks:
  lawlatt_network:
    driver: bridge
